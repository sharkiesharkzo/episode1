<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Episode 1</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video {
            max-width: 100%;
            max-height: 100%;
            background: black;
        }
        /* Overlay play button */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body>
<button onclick="window.location.href='https://sharkiesharkzo.github.io/home/';">←</button>
    <!-- Click overlay -->
    <div id="overlay">▶ Click to Play</div>

    <!-- Video element -->
    <video id="introVideo" controls>
        <source src="https://raw.githubusercontent.com/sharkiesharkzo/home/main/mark%20and%20jeff%20misadventures.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <script>
        const overlay = document.getElementById('overlay');
        const video = document.getElementById('introVideo');

        // Start video with sound on click
        overlay.addEventListener('click', () => {
            overlay.style.display = 'none'; // Hide overlay
            video.play().catch(err => {
                console.error("Video play failed:", err);
            });
        });

        // Redirect when video ends
        video.addEventListener('ended', () => {
            window.location.href = "https://example.com"; // Change to your target URL
        });
    </script>

</body>
</html>
